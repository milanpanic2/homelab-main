apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vscode-server
  namespace: vscode-https
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca-issuer
    konghq.com/protocols: https
    konghq.com/https-redirect-status-code: "301"
    # Required for VS Code Server WebSocket connections
    nginx.org/websocket-services: vscode-server
    konghq.com/connect-timeout: "60000"
    konghq.com/read-timeout: "60000"
    konghq.com/write-timeout: "60000"
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - code.homelab.com
      secretName: vscode-server-tls
  rules:
    - host: code.homelab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vscode-server
                port:
                  number: 8079
