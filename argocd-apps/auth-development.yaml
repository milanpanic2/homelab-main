apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-development
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/milanpanic2/auth.git
    path: .
    targetRevision: main
    helm:
      valueFiles:
      - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: development
  syncPolicy:
    automated:
      selfHeal: true
