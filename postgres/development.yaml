---
# Development PostgreSQL cluster
# Hosts app databases only
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dev-postgresql
  namespace: databases
spec:
  instances: 1
  enableSuperuserAccess: true

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  postgresql:
    parameters:
      max_connections: "50"
      shared_buffers: "256MB"

  managed:
    roles:
      - name: cluster_user
        ensure: present
        login: true
        superuser: false
        createdb: true
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: 20
        passwordSecret:
          name: app-development-secret
