---
# ExternalName services so apps in production/development
# can access their database as just "postgresql:5432"
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: production
spec:
  type: ExternalName
  externalName: prod-postgresql-rw.databases.svc.cluster.local

---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: development
spec:
  type: ExternalName
  externalName: dev-postgresql-rw.databases.svc.cluster.local
