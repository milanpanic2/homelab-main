---
apiVersion: v1
kind: Namespace
metadata:
  name: production

---
# Production PostgreSQL cluster
# Hosts app databases + infrastructure databases (keycloak, forgejo)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: prod-postgresql
  namespace: production
spec:
  instances: 1
  enableSuperuserAccess: true

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "512MB"

  managed:
    roles:
      - name: app_user
        ensure: present
        login: true
        superuser: false
        createdb: true
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: 50
        passwordSecret:
          name: app-postgres-secret

      - name: app_readonly_user
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: 5
        passwordSecret:
          name: app-readonly-postgres-secret

      - name: keycloak
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: 10
        passwordSecret:
          name: keycloak-postgres-secret

      - name: forgejo
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: 10
        passwordSecret:
          name: forgejo-postgres-secret

---
apiVersion: v1
kind: Secret
metadata:
  name: app-postgres-secret
  namespace: production
stringData:
  username: app_user
  password: aezakmi

---
apiVersion: v1
kind: Secret
metadata:
  name: app-readonly-postgres-secret
  namespace: production
stringData:
  username: app_readonly_user
  password: aezakmi

---
# Infrastructure secrets (reflected to keycloak/forgejo namespaces)
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgres-secret
  namespace: production
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "keycloak"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "keycloak"
stringData:
  username: keycloak
  password: keycloak-db-pass

---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-postgres-secret
  namespace: production
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "forgejo"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "forgejo"
stringData:
  username: forgejo
  password: forgejo-db-pass

---
# Declarative database creation
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: keycloak-db
  namespace: production
spec:
  name: keycloak
  owner: keycloak
  cluster:
    name: prod-postgresql

---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: forgejo-db
  namespace: production
spec:
  name: forgejo
  owner: forgejo
  cluster:
    name: prod-postgresql
