---
# PostgreSQL cluster
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: databases
spec:
  instances: 1
  enableSuperuserAccess: true

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "512MB"

  managed:
    roles:
      - name: cluster_user
        ensure: present
        login: true
        superuser: false
        createdb: true
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: 50
        passwordSecret:
          name: cluster-secret

---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: forgejo-db
  namespace: databases
spec:
  name: forgejo
  owner: cluster_user
  cluster:
    name: postgresql
