apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.monitoring
        isDefault: true
        access: proxy

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring:3200
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: prometheus

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring
        access: proxy
        jsonData:
          httpHeaderName1: X-Scope-OrgID
          derivedFields:
            - name: TraceID
              datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              url: "$${__value.raw}"
        secureJsonData:
          httpHeaderValue1: "1"
