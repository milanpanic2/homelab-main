apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        env:
        - name: OPENAI_API_BASE_URL
          value: "http://vllm:8000/v1"
        - name: OPENAI_API_KEY
          value: "unused"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: vllm
spec:
  selector:
    app: open-webui
  ports:
  - port: 8080
    targetPort: 8080
